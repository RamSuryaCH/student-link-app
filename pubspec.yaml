name: student_link_app
description: A premier, offline-first, real-time campus networking application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase Core & Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10
  cloud_functions: ^4.5.7
  
  # State Management & Architecture
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  equatable: ^2.0.5
  dartz: ^0.10.1
  
  # UI & Animations
  glassmorphism: ^3.0.0
  flutter_animate: ^4.2.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Routing
  go_router: ^12.1.1
  
  # Image & Media
  image_picker: ^1.0.4
  image_cropper: ^5.0.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  logger: ^2.0.2
  timeago: ^3.6.0
  url_launcher: ^6.2.1
  crypto: ^3.0.3
  
  # Gemini AI
  google_generative_ai: ^0.2.1
  
  # Notifications & Permissions
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
