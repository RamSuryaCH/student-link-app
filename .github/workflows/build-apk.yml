name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - 'copilot/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android platform configurations
        run: |
          # Generates android/ folder so flutter build can run
          flutter create --platforms=android --org com.studentlink.app .

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudentLink-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Get version from pubspec
        id: version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: StudentLink v${{ steps.version.outputs.version }}
          body: |
            ## StudentLink App APK

            Download the APK below and install it on your Android device.

            > **Note:** You may need to enable "Install from unknown sources" in your Android settings.
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
